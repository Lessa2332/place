<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>🌸 Посади квітку — AR-сад для дітей</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">

  <!-- 1. Бібліотека A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- 2. Локальний бінарний файл 8th Wall з попереднім завантаженням SLAM -->
  <script src="xr.js" async data-preload-chunks="slam"></script>

  <!-- 3. Ваш компонент -->
  <script src="tap-place.js"></script>
</head>
<body>
  <!-- Основна AR-сцена -->
  <!-- Атрибут xrweb="allowedDevices: any" необхідний для роботи -->
  <a-scene xrweb="allowedDevices: any" ar-hit-test="mode: plane" tap-place>
    <a-assets>
      <a-asset-item id="flowerModel" src="flower.glb"></a-asset-item>
    </a-assets>

    <!-- Камера. Позиція в AR не має значення, її встановить 8th Wall -->
    <a-camera id="camera" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>

    <!-- Освітлення для тіней -->
    <a-entity light="type: directional; intensity: 1.0; castShadow: true" position="4 12 6"></a-entity>
    <a-light type="ambient" intensity="0.75"></a-light>

    <!-- Невидима "земля" для рейкастингу -->
    <a-box id="ground" class="cantap" scale="4000 0.05 4000" position="0 -0.02 0" visible="false" material="shader: flat; color: #228B22; transparent: true; opacity: 0"></a-box>
  </a-scene>
</body>
</html>

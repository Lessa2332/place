<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Посади квітку 🌸 — AR-сад для дітей</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  
  <!-- Політика безпеки (CSP) – дозволяє тільки необхідне -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://aframe.io;
    style-src 'self' 'unsafe-inline';
    media-src 'self' blob:;
    connect-src 'none';
    img-src 'self' data:;
    frame-src 'none';
  ">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- Локальний 8th Wall Engine Binary (без хмари) -->
  <script src="xr.js" async data-preload-chunks="slam"></script>

  <!-- Наш компонент для посадки квітів -->
  <script src="tap-place.js"></script>

  <style>
    /* Стиль для повідомлення про камеру (безпека + згода) */
    #camera-consent {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      color: white;
      padding: 16px 20px;
      border-radius: 28px;
      text-align: center;
      z-index: 1000;
      font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }
    #camera-consent p {
      margin: 0 0 12px 0;
      font-size: 14px;
      line-height: 1.4;
    }
    #camera-consent button {
      background: #4CAF50;
      border: none;
      padding: 10px 24px;
      margin: 0 8px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: white;
      transition: transform 0.1s ease;
    }
    #camera-consent button:active {
      transform: scale(0.97);
    }
    #camera-consent .decline {
      background: #f44336;
    }
    .privacy-link {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-family: sans-serif;
      z-index: 1000;
    }
    .privacy-link a {
      color: #ddd;
      text-decoration: none;
    }
    .privacy-link a:hover {
      text-decoration: underline;
      color: white;
    }
  </style>
</head>
<body>

  <!-- Повідомлення про камеру (згода батьків/дитини) -->
  <div id="camera-consent">
    <p>📸 <strong>Для гри потрібна камера</strong><br>Відео не записується і не передається в інтернет. Жодні дані не збираються.</p>
    <button id="accept-camera">🌼 Дозволити</button>
    <button id="decline-camera" class="decline">❌ Відмовитись</button>
  </div>

  <!-- AR-сцена -->
  <a-scene
    id="scene"
    embedded
    renderer="colorManagement: true"
    tap-place
    xrweb="allowedDevices: any"
    ar-hit-test="mode: plane; targetRayMode: tracked-pointer"
  >
    <!-- Активи -->
    <a-assets>
      <a-asset-item id="flowerModel" src="flower.glb"></a-asset-item>
    </a-assets>

    <!-- Камера (AR керує позицією) -->
    <a-camera
      id="camera"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse"
    ></a-camera>

    <!-- Освітлення -->
    <a-entity light="type: directional; intensity: 1.2; castShadow: true" position="5 15 8"></a-entity>
    <a-light type="ambient" intensity="0.7"></a-light>

    <!-- Прозора "земля" для кліків (невидима, але потрібна для подій) -->
    <a-box
      id="ground"
      class="cantap"
      scale="3000 0.02 3000"
      position="0 -0.1 0"
      material="shader: flat; color: #228B22; transparent: true; opacity: 0.0"
      visible="false"
    ></a-box>

    <!-- Інструкція -->
    <a-text
      value="🌸 Торкнись підлоги або столу, щоб посадити квітку"
      position="0 1.6 -2.5"
      align="center"
      color="#ffffff"
      width="2.8"
      background="true"
      background-color="rgba(0,0,0,0.6)"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt"
    ></a-text>
  </a-scene>

  <!-- Посилання на політику конфіденційності -->
  <div class="privacy-link">
    <a href="assets/privacy-policy.html" target="_blank" rel="noopener noreferrer">🔒 Політика конфіденційності</a>
  </div>

  <script>
    // Проста згода на камеру (без зберігання даних)
    const consentDiv = document.getElementById('camera-consent');
    const acceptBtn = document.getElementById('accept-camera');
    const declineBtn = document.getElementById('decline-camera');
    const scene = document.getElementById('scene');

    acceptBtn.onclick = () => {
      consentDiv.style.display = 'none';
      // Запускаємо AR-сесію (8th Wall сам запросить дозвіл, але ми вже отримали згоду)
      scene.setAttribute('xrweb', 'allowedDevices: any');
      // Невелика затримка для ініціалізації
      setTimeout(() => {
        if (scene.components['xrweb']) {
          scene.components['xrweb'].startSession();
        }
      }, 100);
    };

    declineBtn.onclick = () => {
      consentDiv.innerHTML = '<p>❌ Без доступу до камери гра неможлива. Оновіть сторінку, якщо передумаєте.</p>';
      consentDiv.style.background = 'rgba(0,0,0,0.9)';
    };
  </script>
</body>
</html>

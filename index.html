<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Посади квітку 🌸 — Не рви, а сади!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- 8th Wall XR Engine Binary (world tracking / SLAM) -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@latest/dist/xr.js"
          async 
          crossorigin="anonymous" 
          data-preload-chunks="slam">
  </script>

  <!-- Твій скрипт для висаджування квітів -->
  <script src="tap-place.js"></script>
</head>
<body>
  <a-scene 
    xrweb="allowedDevices: any"
    renderer="colorManagement: true"
    tap-place
    background="color: #87CEEB">

    <a-assets>
      <a-asset-item id="flowerModel" src="flower.glb"></a-asset-item>
    </a-assets>

    <!-- Камера з raycaster -->
    <a-camera 
      id="camera"
      position="0 1.6 0"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <!-- Освітлення -->
    <a-entity 
      light="type: directional; intensity: 0.9; castShadow: true" 
      position="3 10 5">
    </a-entity>
    <a-light type="ambient" intensity="0.7"></a-light>

    <!-- Земля (по ній тапаємо) -->
<a-box 
  id="ground"
  class="cantap"
  scale="2000 0.05 2000"          <!-- тонша -->
  position="0 -0.8 0"             <!-- опустили вниз -->
  material="shader: flat; color: #228B22; transparent: true; opacity: 0.15"
  shadow="receive: true">
</a-box>

    <!-- Текст для проєкту -->
    <a-text 
      value="Не рви рослини!\nПосади віртуальну квітку і милуйся 🌸\nТапни по землі"
      position="0 2.3 -3"
      align="center"
      color="#2E8B57"
      width="3.2"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
    </a-text>

  </a-scene>
</body>
</html>

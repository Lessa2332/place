<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>Посади квітку 🌸 — Не рви, а сади!</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">

  <!-- A-Frame -->
  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>

  <!-- 8th Wall XR Engine Binary -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@latest/dist/xr.js"
          async
          crossorigin="anonymous"
          data-preload-chunks="slam">
  </script>

  <!-- Твій скрипт -->
  <script src="tap-place.js"></script>
</head>
<body>
  <a-scene
    xrweb="allowedDevices: any"
    renderer="colorManagement: true"
    tap-place
    background="color: #87CEEB"
    ar-hit-test="mode: plane; targetRayMode: tracked-pointer">

    <!-- Активи -->
    <a-assets>
      <a-asset-item id="flowerModel" src="flower.glb"></a-asset-item>
    </a-assets>

    <!-- Камера -->
    <a-camera
      id="camera"
      position="0 1.6 0"
      raycaster="objects: .cantap"
      cursor="fuse: false; rayOrigin: mouse;">
    </a-camera>

    <!-- Освітлення -->
    <a-entity
      light="type: directional; intensity: 1.0; castShadow: true"
      position="5 15 8">
    </a-entity>
    <a-light type="ambient" intensity="0.65"></a-light>

    <!-- Земля для тапу (оптимізована під правильну висоту) -->
    <a-box
      id="ground"
      class="cantap"
      scale="3000 0.1 3000"
      position="0 -0.05 0"
      material="shader: flat; color: #228B22; transparent: true; opacity: 0.18"
      shadow="receive: true">
    </a-box>

    <!-- Екологічний текст -->
    <a-text
      value="Не рви рослини!\nПосади віртуальну квітку і милуйся 🌸\nТапни по землі"
      position="0 2.0 -3"
      align="center"
      color="#2E8B57"
      width="3.0"
      font="https://cdn.aframe.io/fonts/Exo2Bold.fnt">
    </a-text>

  </a-scene>
</body>
</html>

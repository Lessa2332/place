<!DOCTYPE html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <title>🌸 Посади квітку — AR-сад для дітей</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>">

  <!-- Політика безпеки (CSP) – дозволяє 8th Wall, але блокує сторонні трекери -->
  <meta http-equiv="Content-Security-Policy" content="
    default-src 'self';
    script-src 'self' https://cdn.8thwall.com https://cdn.jsdelivr.net 'unsafe-eval' 'unsafe-inline';
    style-src 'self' 'unsafe-inline';
    media-src 'self' blob: data:;
    connect-src 'self' data: blob: https:;
    img-src 'self' data: https:;
    frame-src 'none';
    worker-src 'self' blob:;
  ">

  <!-- 8-Frame (модифікований A-Frame) -->
  <script src="https://cdn.8thwall.com/web/aframe/8frame-1.3.0.min.js"></script>

  <!-- 8th Wall Engine Binary (бінарник) -->
  <script src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/dist/xr.js" async crossorigin="anonymous" data-preload-chunks="slam"></script>

  <script src="tap-place.js"></script>

  <style>
    #camera-consent {
      position: fixed;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(0,0,0,0.85);
      backdrop-filter: blur(10px);
      color: white;
      padding: 16px 20px;
      border-radius: 28px;
      text-align: center;
      z-index: 1000;
      font-family: system-ui, sans-serif;
      box-shadow: 0 4px 20px rgba(0,0,0,0.3);
      border: 1px solid rgba(255,255,255,0.2);
    }
    #camera-consent p {
      margin: 0 0 12px 0;
      font-size: 14px;
      line-height: 1.4;
    }
    #camera-consent button {
      background: #4CAF50;
      border: none;
      padding: 10px 24px;
      margin: 0 8px;
      border-radius: 40px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      color: white;
    }
    #camera-consent .decline {
      background: #f44336;
    }
    .privacy-link {
      position: fixed;
      bottom: 12px;
      right: 12px;
      background: rgba(0,0,0,0.5);
      padding: 6px 12px;
      border-radius: 20px;
      font-size: 11px;
      z-index: 1000;
    }
    .privacy-link a {
      color: #ddd;
      text-decoration: none;
    }
    .privacy-link a:hover {
      text-decoration: underline;
      color: white;
    }
  </style>
</head>
<body>
  <div id="camera-consent">
    <p>📸 <strong>Для гри потрібна камера</strong><br>Відео не записується і не передається. Жодні дані не збираються.</p>
    <button id="accept-camera">🌼 Дозволити</button>
    <button id="decline-camera" class="decline">❌ Відмовитись</button>
  </div>

  <a-scene xrconfig="allowedDevices: any" xrweb="disableWorldTracking: false" ar-hit-test="mode: plane" tap-place>
    <a-assets>
      <a-asset-item id="flowerModel" src="flower.glb"></a-asset-item>
    </a-assets>

    <a-camera id="camera" raycaster="objects: .cantap" cursor="fuse: false; rayOrigin: mouse"></a-camera>

    <a-entity light="type: directional; intensity: 1.0; castShadow: true" position="4 12 6"></a-entity>
    <a-light type="ambient" intensity="0.75"></a-light>

    <!-- Невидима земля -->
    <a-box id="ground" class="cantap" scale="4000 0.05 4000" position="0 -0.02 0" visible="false" material="shader: flat; color: #228B22; transparent: true; opacity: 0"></a-box>

    <!-- Текст-підказка -->
    <a-text
      value="🌸 Торкнись підлоги або столу, щоб посадити квітку"
      position="0 1.7 -2.5"
      align="center"
      color="#ffffff"
      width="3.0"
      background="true"
      background-color="rgba(0,0,0,0.65)"
    ></a-text>
  </a-scene>

  <div class="privacy-link">
    <a href="assets/privacy-policy.html" target="_blank" rel="noopener noreferrer">🔒 Політика конфіденційності</a>
  </div>

  <script>
    const consentDiv = document.getElementById('camera-consent');
    const acceptBtn = document.getElementById('accept-camera');
    const declineBtn = document.getElementById('decline-camera');

    acceptBtn.onclick = () => {
      consentDiv.style.display = 'none';
      // AR автоматично запускається через xrweb, нічого додатково не потрібно
    };
    declineBtn.onclick = () => {
      consentDiv.innerHTML = '<p>❌ Без доступу до камери гра неможлива. Оновіть сторінку, якщо передумаєте.</p>';
    };
  </script>
</body>
</html>
